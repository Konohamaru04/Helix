appId: com.abstergo.helix
productName: Helix
icon: Assets/icon.ico
directories:
  output: release
files:
  - dist/**
  - package.json
asar: true
afterPack: scripts/electron-builder-after-pack.mjs
removePackageScripts: true
electronLanguages:
  - en-US
win:
  target:
    - target: dir
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Helix
  artifactName: ${productName}-Setup-${version}.${ext}
portable:
  artifactName: ${productName}-Portable-${version}.${ext}
publish:
  - provider: github
    owner: Konohamaru04
    repo: Helix
    releaseType: release
extraResources:
  - from: Assets
    to: Assets
    filter:
      - '**/*'
  - from: python_embeded
    to: python_embeded
    filter:
      - '**/*'
      - '!Scripts/numpy-config.exe'
      - '!Lib/site-packages/numpy/**'
      - '!Lib/site-packages/numpy.libs/**'
      - '!Lib/site-packages/numpy-*.dist-info/**'
      - '!Lib/site-packages/einops/**'
      - '!Lib/site-packages/einops-*.dist-info/**'
      - '!Lib/site-packages/transformers/**'
      - '!Lib/site-packages/transformers-*.dist-info/**'
      - '!Lib/site-packages/tokenizers/**'
      - '!Lib/site-packages/tokenizers-*.dist-info/**'
      - '!Lib/site-packages/sentencepiece/**'
      - '!Lib/site-packages/sentencepiece-*.dist-info/**'
      - '!Lib/site-packages/safetensors/**'
      - '!Lib/site-packages/safetensors-*.dist-info/**'
      - '!Lib/site-packages/aiohttp/**'
      - '!Lib/site-packages/aiohttp-*.dist-info/**'
      - '!Lib/site-packages/yarl/**'
      - '!Lib/site-packages/yarl-*.dist-info/**'
      - '!Lib/site-packages/yaml/**'
      - '!Lib/site-packages/_yaml.pyd'
      - '!Lib/site-packages/pyyaml-*.dist-info/**'
      - '!Lib/site-packages/PIL/**'
      - '!Lib/site-packages/pillow-*.dist-info/**'
      - '!Lib/site-packages/scipy/**'
      - '!Lib/site-packages/scipy.libs/**'
      - '!Lib/site-packages/scipy-*.dist-info/**'
      - '!Lib/site-packages/scipy-*.whl'
      - '!Lib/site-packages/tqdm/**'
      - '!Lib/site-packages/tqdm-*.dist-info/**'
      - '!Lib/site-packages/psutil/**'
      - '!Lib/site-packages/psutil-*.dist-info/**'
      - '!Lib/site-packages/alembic/**'
      - '!Lib/site-packages/alembic-*.dist-info/**'
      - '!Lib/site-packages/sqlalchemy/**'
      - '!Lib/site-packages/sqlalchemy-*.dist-info/**'
      - '!Lib/site-packages/filelock/**'
      - '!Lib/site-packages/filelock-*.dist-info/**'
      - '!Lib/site-packages/av/**'
      - '!Lib/site-packages/av.libs/**'
      - '!Lib/site-packages/av-*.dist-info/**'
      - '!Lib/site-packages/requests/**'
      - '!Lib/site-packages/requests-*.dist-info/**'
      - '!Lib/site-packages/simpleeval.py'
      - '!Lib/site-packages/simpleeval-*.dist-info/**'
      - '!Lib/site-packages/blake3/**'
      - '!Lib/site-packages/blake3-*.dist-info/**'
  - from: inference_server
    to: inference_server
    filter:
      - '**/*'
  - from: comfyui_backend
    to: comfyui_backend
    filter:
      - '**/*'
  - from: skills
    to: skills
    filter:
      - '**/*'
  - from: config
    to: config
    filter:
      - '**/*'
  - from: models
    to: models
    filter:
      - '**/*'
  - from: knowledge
    to: knowledge
    filter:
      - '**/*'
