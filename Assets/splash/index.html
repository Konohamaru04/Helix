<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Helix Loading</title>
    <link
      rel="stylesheet"
      href="./styles.css"
    />
  </head>
  <body>
    <main class="splash-shell">
      <section class="hero-panel">
        <div class="video-frame">
          <video
            autoplay
            loop
            muted
            playsinline
            preload="auto"
            aria-hidden="true"
          >
            <source
              src="./splash.webm"
              type="video/webm"
            />
          </video>
        </div>

        <div class="brand-lockup">
          <img
            class="brand-mark"
            src="./logo.png"
            alt="Helix"
          />
          <div class="copy-block">
            <p class="eyebrow">Local-first AI workbench</p>
            <h1>Helix</h1>
            <p
              id="status"
              class="status"
            >
              Bootstrapping local services
            </p>
          </div>
        </div>

        <div
          class="progress-track"
          aria-hidden="true"
        >
          <div
            id="progressFill"
            class="progress-fill"
          ></div>
        </div>

        <p
          id="detail"
          class="detail"
        >
          Opening the bridge, database, tool surface, and renderer.
        </p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
